<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Todo List</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playpen+Sans:wght@100..800&family=Pliant:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
	<div class="main-container">
		<div class="sidebar">
			<button id="close-sidebar-btn"><img src="assets/list-icon.png" width="40px" height="40px"></button>
			<h1>Workspaces</h1>
			<div class="workspaces">


			</div>
			<button id="add-workspace-btn">Add workspace</button>
		</div>
		<div class="canvas">
			<div class="menu">
				<button id="open-sidebar-btn"><img src="assets/list-icon.png" width="40px" height="40px"></button>
				<button id="add-task-btn">Add Task</button>
			</div>
			<div class="selected-workspace">

			</div>
		</div>
	</div>
	<div class="task-manager">
		<h3>Task Manager</h3>
		<button type="button" class="close-task-manager-btn">X</button>
		<form id="task-form">
			<div class="entry">
				<label for="title">Title:</label>
				<input id="title" minlength="1" required>
			</div>
			<div class="entry">
				<label for="description">Description:</label>
				<textarea id="description"></textarea>
			</div>
			<div class="entry">
				<label for="due-date">Due Date:</label>
				<input id="due-date" type="date" required>
			</div>
			<div class="entry">
				<label for="priority">Priority:</label>
				<div class="priority">
					<div>
						<input id="low-priority" type="radio" name="priority" value="low" checked>
						<label for="low-priority">low</label>
					</div>
					<div>
						<input id="intermediate-priority" type="radio" name="priority" value="medium">
						<label for="intermediate-priority">medium</label>
					</div>
					<div>
						<input id="urgent-priority" type="radio" name="priority" value="urgent">
						<label for="urgent-priority">urgent</label>
					</div>
				</div>
			</div>
			<button class="confirm-btn">Confirm</button>
		</form>
	</div>
	<div class="workspace-manager">
		<div>
			<h3>Workspace Manager</h3>
			<button type="button" class="close-workspace-manager-btn">X</button>
		</div>
		<form>
			<div class="entry">
				<label>Workspace Name:</label>
				<input type="text">
			</div>
			<button type="button" id="confirm-workspace-btn">Confirm</button>
		</form>
	</div>
</body>
</html>
